services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: farm
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: farm
    volumes:
      - farm_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U farm -d farm']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://farm:${DB_PASSWORD}@db:5432/farm
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ORIGIN: ${ORIGIN:-}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Farm Manager}
      UPLOAD_DIR: /data/uploads
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-10}
      # Required when fronted by a reverse proxy that terminates TLS.
      PROTOCOL_HEADER: ${PROTOCOL_HEADER:-}
      HOST_HEADER: ${HOST_HEADER:-}
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - farm_uploads:/data/uploads

volumes:
  farm_db:
  farm_uploads:
