<!DOCTYPE html>
<html lang="en-GB" %sveltekit.theme%>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#15803d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Farm" />
    <link rel="manifest" href="/manifest.webmanifest" />

    %sveltekit.head%

  <body data-sveltekit-preload-data="hover" class="min-h-screen bg-white text-slate-900 antialiased dark:bg-slate-900 dark:text-slate-100">
