name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: farm
          POSTGRES_PASSWORD: farm
          POSTGRES_DB: farm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U farm -d farm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://farm:farm@127.0.0.1:5432/farm
      APP_PASSWORD: dev-password
      SESSION_SECRET: ${{ secrets.SESSION_SECRET_CI || 'deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e
